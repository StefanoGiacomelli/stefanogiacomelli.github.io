name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  repository_dispatch:
    types: [cv-updated]
  schedule:
    - cron: "0 0 * * *"   # ogni notte a mezzanotte UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4

      - name: Fetch files from Academic_CV
        env:
          CV_TOKEN: ${{ secrets.CV_REPO_TOKEN }}
        run: |
          git clone --depth=1 https://StefanoGiacomelli:${CV_TOKEN}@github.com/StefanoGiacomelli/Academic_CV.git /tmp/Academic_CV
          cp /tmp/Academic_CV/publications.bib data/publications.bib
          cp /tmp/Academic_CV/Academic_CV.pdf data/Academic_CV.pdf

      - name: Commit updated CV files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/publications.bib data/Academic_CV.pdf
          git diff --staged --quiet || (git commit -m "chore: update CV files from Academic_CV [skip ci]" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
